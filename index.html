<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中俄翻译 | 个人主页</title>
  <style>
    body { margin:0; font-family:"Helvetica Neue", Arial; background:#f5f5f5; color:#333; }

    /* ===== 页面整体收窄（两侧留白更多） ===== */
    .container { max-width: 820px; margin: 0 auto; }

    header { position:fixed; top:0; width:100%; background:rgba(255,255,255,0.65); backdrop-filter:blur(12px); display:flex; justify-content:center; z-index:1000; }
    .header-inner{ width:820px; display:flex; justify-content:space-between; align-items:center; padding:12px 10px; }

    .logo{font-size:18px;font-weight:bold;}

    nav{display:flex;align-items:center;}
    nav a{margin-left:18px;text-decoration:none;color:#333;font-size:13px;}
    .lang-switch{cursor:pointer;margin-left:18px;font-size:13px;font-weight:600;}

    section{padding:80px 0;}
    .tight{padding-top:30px;}

    /* ===== 首页头像放大 ===== */
    .hero{display:flex;align-items:center;gap:40px;}
    .hero img{width:220px;border-radius:50%;border:6px solid #fff;box-shadow:0 4px 20px rgba(0,0,0,0.1);} 

    .btn{display:inline-block;margin-top:15px;padding:10px 16px;background:#0b3d91;color:#fff;border-radius:6px;text-decoration:none;font-size:13px;}
    .btn:hover{background:#082c6c;}

    .card{position:relative;background:#fff;padding:18px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-bottom:15px;transition:0.3s;overflow:hidden;}
    .card:hover{transform:translateY(-6px);box-shadow:0 10px 25px rgba(0,0,0,0.12);}    
    .card::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,0.4), transparent 40%);opacity:0;transition:0.3s;}
    .card:hover::before{opacity:1;}

    .fade-in{opacity:0;transform:translateY(30px);transition:0.6s;}
    .fade-in.visible{opacity:1;transform:translateY(0);}    

    /* ===== 翻译案例整体上移 ===== */
    #cases{ margin-top:-40px; }

    /* ===== 作品集轮播 ===== */
    .carousel{position:relative;overflow:hidden;margin-top:20px;}
    .carousel-viewport{overflow:hidden;border-radius:16px;}
    .carousel-track{display:flex;gap:16px;}
    .slide{flex:0 0 80%; border-radius:14px; overflow:hidden; transform:scale(0.92); transition:.4s; box-shadow:0 6px 20px rgba(0,0,0,.08);} 
    .slide.active{transform:scale(1); box-shadow:0 12px 35px rgba(0,0,0,.16);} 
    .slide img{width:100%; height:260px; object-fit:cover;}

    .dots{display:flex; justify-content:center; gap:8px; margin-top:10px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#ccc;cursor:pointer;}
    .dot.active{background:#0b3d91;}

    footer{text-align:center;padding:20px;font-size:12px;color:#888;}

    /* ===== 移动端 ===== */
    @media (max-width:768px){
      .header-inner{width:100%;padding:10px 15px;}
      .container{padding:0 15px;}
      .hero{flex-direction:column;text-align:center;}
      .hero img{width:160px;}
      .slide{flex-basis:88%;}
    }
    @media (max-width:480px){ nav a{display:none;} }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">你的名字</div>
    <nav>
      <a href="#about" data-zh="关于我" data-ru="Обо мне">关于我</a>
      <a href="#cases" data-zh="翻译案例" data-ru="Проекты">翻译案例</a>
      <a href="#services" data-zh="服务" data-ru="Услуги">服务</a>
      <a href="#contact" data-zh="联系" data-ru="Контакты">联系</a>
      <span class="lang-switch" onclick="toggleLang()">РУ</span>
    </nav>
  </div>
</header>

<div class="container">

<section class="hero fade-in" id="about">
  <img src="your-photo.jpg">
  <div>
    <h1 data-zh="中俄翻译 | 会议口译 / 笔译" data-ru="Китайско-русский переводчик">中俄翻译 | 会议口译 / 笔译</h1>
    <p data-zh="专业从事外交、教育、科技翻译" data-ru="Профессиональный переводчик">专业从事外交、教育、科技翻译</p>
    <a href="resume.pdf" class="btn" data-zh="下载简历" data-ru="Скачать резюме">下载简历</a>
  </div>
</section>

<section id="cases" class="fade-in">
  <h2 data-zh="翻译案例" data-ru="Проекты">翻译案例</h2>
  <div class="card">会议口译案例</div>
  <div class="card">外交文件翻译</div>

  <div class="carousel">
    <div class="carousel-viewport">
      <div class="carousel-track" id="track">
        <div class="slide"><img src="1.jpg"></div>
        <div class="slide"><img src="2.jpg"></div>
        <div class="slide"><img src="3.jpg"></div>
        <div class="slide"><img src="4.jpg"></div>
        <div class="slide"><img src="5.jpg"></div>
        <div class="slide"><img src="6.jpg"></div>
        <div class="slide"><img src="7.jpg"></div>
      </div>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</section>

<section id="services" class="fade-in tight">
  <h2 data-zh="服务内容" data-ru="Услуги">服务内容</h2>
  <div class="card">会议口译 / 文件翻译</div>
</section>

<section id="contact" class="fade-in tight">
  <h2 data-zh="联系方式" data-ru="Контакты">联系方式</h2>
  <div class="card">邮箱 / 微信</div>
</section>

<footer>© 2026</footer>

</div>

<script>
const observer=new IntersectionObserver(e=>{e.forEach(i=>{if(i.isIntersecting)i.target.classList.add('visible')})});
document.querySelectorAll('.fade-in').forEach(el=>observer.observe(el));

let isRU=false;
function toggleLang(){
  isRU=!isRU;
  document.querySelectorAll('[data-zh]').forEach(el=>{
    el.innerText=isRU?el.dataset.ru:el.dataset.zh;
  });
}
</script>

</body>
</html>
